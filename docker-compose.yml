version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq-bus
    ports:
      - "5672:5672"   # Puerto de comunicación API
      - "15672:15672" # Puerto para el panel de administración web
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  rabbitmq_data: